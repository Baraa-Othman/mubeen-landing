kind = "web"
previewPath = "/"
title = "Mubeen Landing Page"
version = "1.0.0"
id = "artifacts/mubeen-landing"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26076

[services.development]
run = "pnpm --filter @workspace/mubeen-landing run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mubeen-landing", "run", "build" ]
publicDir = "artifacts/mubeen-landing/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26076"
BASE_PATH = "/"
